services:
  classify-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: idp-api:latest
    container_name: classify-api
    command: ["uvicorn", "app.healthcare_api:classify_app", "--host", "0.0.0.0", "--port", "7871"]
    environment:
      OLLAMA_BASE_URL: ${CONTAINER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-qwen3.5:9b-q4_K_M}
      PDF_RENDER_DPI: ${PDF_RENDER_DPI:-200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7871:7871"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7871/ >/dev/null && curl -sf ${OLLAMA_BASE_URL}/api/version >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  extraction-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: idp-api:latest
    container_name: extraction-api
    command: ["uvicorn", "app.healthcare_api:extraction_app", "--host", "0.0.0.0", "--port", "7872"]
    environment:
      OLLAMA_BASE_URL: ${CONTAINER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EXTRACTOR_MODEL: ${EXTRACTOR_MODEL:-qwen3.5:9b-q4_K_M}
      DEFAULT_PROMPT_TEMPLATE: ${DEFAULT_PROMPT_TEMPLATE:-healthcare_types/prompt_with_template.txt}
      DEFAULT_JSON_TEMPLATE: ${DEFAULT_JSON_TEMPLATE:-healthcare_types/page-04-template.json}
      PDF_RENDER_DPI: ${PDF_RENDER_DPI:-200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7872:7872"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7872/ >/dev/null && curl -sf ${OLLAMA_BASE_URL}/api/version >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  healthcare-ollama-pipeline-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: idp-api:latest
    container_name: healthcare-ollama-pipeline-api
    command: ["uvicorn", "app.healthcare_api:healthcare_pipeline_app", "--host", "0.0.0.0", "--port", "7865"]
    environment:
      OLLAMA_BASE_URL: ${CONTAINER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-qwen3.5:9b-q4_K_M}
      EXTRACTOR_MODEL: ${EXTRACTOR_MODEL:-qwen3.5:9b-q4_K_M}
      TEMPLATES_DIR: ${TEMPLATES_DIR:-/app/data/prompts}
      OUTPUT_DIR: ${OUTPUT_DIR:-/app/output}
      PDF_RENDER_DPI: ${PDF_RENDER_DPI:-200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7865:7865"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - classify-api
      - extraction-api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7865/ >/dev/null && curl -sf ${OLLAMA_BASE_URL}/api/version >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
