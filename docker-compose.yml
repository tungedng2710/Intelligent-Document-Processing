services:
  # ── IDP API (OCR + LLM + Wrapper) ─────────────────────────────────────────
  idp-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: idp-api:latest
    container_name: idp-api
    env_file: .env
    ports:
      - "7871:7871"   # OCR API
      - "7872:7872"   # LLM API
      - "7873:7873"   # Wrapper API
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7871/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # marker models take time to load on first request
