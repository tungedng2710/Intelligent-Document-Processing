version: '3.8'

services:
  qwen3vl-api:
    build: .
    container_name: qwen3vl-document-parser
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=${MODEL_PATH:-Qwen/Qwen2-VL-7B-Instruct}
      - HOST=0.0.0.0
      - PORT=8000
      - TENSOR_PARALLEL_SIZE=${TENSOR_PARALLEL_SIZE:-1}
    volumes:
      # Optional: Mount local model directory
      - ./outputs:/app/outputs
      # Optional: Cache directory for HuggingFace models
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
